---
openapi: 3.0.3
info:
  title: LazyReel API
  version: 1.0.0
  description: |-
    REST API for LazyReel, a content marketing platform that automates
    video and image creation for social media.

    ## Authentication

    All requests require a Bearer token in the `Authorization` header:

    ```
    Authorization: Bearer lr_<48 hex characters>
    ```

    Tokens are scoped to an organization and can be created in the
    LazyReel web app under Settings > API Tokens.

    ## Prefix IDs

    All resources use human-readable prefix IDs instead of numeric IDs.
    For example, an offering ID looks like `offr_abc123` and a campaign ID
    looks like `camp_def456`. Use these prefix IDs in URL paths and
    request bodies.

    ## Response Envelope

    All successful responses wrap data in a `{ "data": ..., "meta": { "timestamp": "..." } }` envelope.
    Error responses use `{ "error": { "message": "...", "code": "..." }, "meta": { "timestamp": "..." } }`.
servers:
- url: https://lazyreel.com/api/v1
